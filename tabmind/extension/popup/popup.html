<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabMind</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- P3 (UX / Product / Demo Lead): build popup UI. Structure below is a starter; wire IDs in popup.js. -->
  <header class="header">
    <h1>TabMind</h1>
    <!-- TODO (P3): distraction score + focus label (low / drifting / overloaded) -->
    <div id="score-row" class="score-row"></div>
  </header>
  <section class="goal-section">
    <h2>Inferred goal</h2>
    <p id="inferred-goal" class="inferred-goal">—</p>
  </section>
  <section class="shield-section">
    <!-- TODO (P3): big "Activate Shield Mode" button; on click send ACTIVATE_SHIELD to background -->
    <button id="shield-btn" class="shield-btn">Activate Shield Mode</button>
  </section>
  <section class="quest-section">
    <h2>Quest</h2>
    <p id="quest-title" class="quest-title">—</p>
    <!-- TODO (P3): mission checklist (from state.quest.missions); checkboxes update storage + progress -->
    <ul id="missions-list" class="missions-list"></ul>
    <!-- TODO (P3): progress bar reflecting completed missions / total -->
    <div id="progress-bar" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
  </section>
  <script src="popup.js"></script>
</body>
</html>
